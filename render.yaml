services:
  # ── Web API ───────────────────────────────────────────────────────────────
  - type: web
    name: whatsapp-pro-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/server.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # All secrets below are set in the Render dashboard (not committed here)
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: knowledge
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_CONFIG_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v20.0
      - key: MONNIFY_API_KEY
        sync: false
      - key: MONNIFY_SECRET_KEY
        sync: false
      - key: MONNIFY_CONTRACT_CODE
        sync: false
      - key: MONNIFY_BASE_URL
        value: https://api.monnify.com
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_SECURE
        value: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: API_PREFIX
        value: /api/v1
      - key: JWT_EXPIRES_IN
        value: 10m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: AI_CHAT_PROVIDER
        value: anthropic
      - key: AI_EMBEDDING_PROVIDER
        value: openai
      # Customer auth (storefront shoppers)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RP_ID
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  # ── Background Worker (BullMQ — aiReply, outbox, notifications) ──────────
  - type: worker
    name: whatsapp-pro-worker
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate
    startCommand: node src/jobs/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      # Worker shares the same env vars as the web service
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: knowledge
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v20.0
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: AI_CHAT_PROVIDER
        value: anthropic
      - key: AI_EMBEDDING_PROVIDER
        value: openai
